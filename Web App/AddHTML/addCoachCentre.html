<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Benchmark Sports</title>
        <link rel="stylesheet" href="../CSS/style.css">
    </head>
    <body>
        <div class="page">

            <div class="add-main">
                <div class="back">
                    <a id ="back" href="../HTML/coachCentre.html">Back to Centre Assignments</a>
                </div>
                <h2>Create Coach Assignment</h2>
                <p>
                    Enter details below:
                </p>

            </div>

            <div class="center-form">
                <form id="coachCentreForm" class="createForm">
                    <div class="form-row">
                        <label for="coachId">Coach ID</label>
                        <input type="number" id="coachId" required>
                    </div>

                    <div class="form-row">
                        <label for="centreId">Centre ID</label>
                        <input type="number" id="centreId" required>
                    </div>

                    <button type="submit">Add Assignment</button>
                </form>
            </div>

            <!-- This empty box is filled with success or error messages by JavaScript. -->
            <div id="output" class="message"></div>
            
        </div>

        <script src="../JS/AddJS/addCoachCentreScript.js"></script>
        <script>
            const showMessage = (text, type) => {
                const output = document.getElementById("output");
                output.textContent = text;
                output.className = `message ${type}`;
            };

            document.querySelector("#coachCentreForm").addEventListener("submit", async (event) => {
                event.preventDefault();

                const coachCentre = {
                    coachId: document.getElementById("coachId").value,
                    centreId: document.getElementById("centreId").value,
                };

                const validationMessage = validateCoachCentre(coachCentre);
                if (validationMessage) {
                    showMessage(validationMessage, "error");
                    return;
                };

                const sql = `INSERT INTO tblCoachCentre (coachId, centreId) VALUES (
                    ${coachCentre.coachId},
                    ${coachCentre.centreId}
                )`;

                console.log(sql);

                const result = await runQuery(sql);

                if (result && result.success) {
                    showMessage("Coach assigned to centre successfully!", "success");
                    form.reset();
                    return;
                }

                if (result && result.error) {
                    showMessage(`Error: ${result.error}`, "error");
                } else {
                    showMessage("Unable to add the record", "error");
                }
            });
        </script>
    </body>

</html>
