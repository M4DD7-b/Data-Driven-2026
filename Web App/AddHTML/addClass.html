<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Benchmark Sports</title>
        <link rel="stylesheet" href="../CSS/style.css">
    </head>
    <body>
        <div class="page">

            <div class="add-main">
                <div class="back">
                    <a id ="back" href="../HTML/add.html">Back to Edit Menu</a>
                </div>
                <h2>Create Class</h2>
                <p>
                    Enter details below:
                </p>

            </div>

            <form id="classForm" class="createForm">

                <div class="form-row">
                    <label for="centreId">Centre ID<sup>*</sup></label>
                    <input type="number" id="centreId" required>
                </div>

                <div class="form-row">
                    <label for="coachId">Coach ID<sup>*</sup></label>
                    <input type="number" id="coachId" required>
                </div>

                <div class="form-row">
                    <label for="className">Class Name<sup>*</sup></label>
                    <input type="text" id="className" required>
                </div>

                <div class="form-row">
                    <label for="classCategory">Class Category<sup>*</sup></label>
                    <input type="text" id="classCategory" required>
                </div>

                <div class="form-row">
                    <label for="classDate">Class Date<sup>*</sup></label>
                    <input type="date" id="classDate" required>
                </div>

                <div class="form-row">
                    <label for="classStartTime">Class Start Time<sup>*</sup></label>
                    <input type="time" id="classStartTime" required>
                </div>

                <div class="form-row">
                    <label for="classEndTime">Class End Time<sup>*</sup></label>
                    <input type="time" id="classEndTime" required>
                </div>

                <button type="submit">Add Class</button>
            </form>

            <!-- This empty box is filled with success or error messages by JavaScript. -->
            <div id="output" class="message"></div>
            
        </div>

        <script src="../JS/addClassScript.js"></script>
        <script>
            const showMessage = (text, type) => {
                const output = document.getElementById("output");
                output.textContent = text;
                output.className = `message ${type}`;
            };

            document.querySelector("#classForm").addEventListener("submit", async (event) => {
                event.preventDefault();

                const session = {
                    className: document.getElementById("className").value,
                    classCategory: document.getElementById("classCategory").value,
                    classDate: document.getElementById("classDate").value,
                    classStartTime: document.getElementById("classStartTime").value,
                    classEndTime: document.getElementById("classEndTime").value
                };

                const validationMessage = validateClass(session);
                if (validationMessage) {
                    showMessage(validationMessage, "error");
                    return;
                };

                const sql = `INSERT INTO tblClass (className, classCategory, classDate, classStartTime, classEndTime) VALUES (
                    '${session.className}',
                    '${session.classCategory}',
                    '${session.classDate}',
                    '${session.classStartTime}',
                    '${session.classEndTime}');`;

                console.log(sql);

                const result = await runQuery(sql);

                if (result && result.success) {
                    showMessage("Class added successfully!", "success");
                    form.reset();
                    return;
                }

                if (result && result.error) {
                    showMessage(`Error: ${result.error}`, "error");
                } else {
                    showMessage("Unable to add the record", "error");
                }
            });
        </script>
    </body>

</html>
