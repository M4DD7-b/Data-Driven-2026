<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Benchmark Sports</title>
        <link rel="stylesheet" href="../CSS/style.css">
    </head>
    <body>
        <div class="page">

            <div class="add-main">
                <div class="back">
                    <a id ="back" href="../HTML/index.html">Back to Centre Menu</a>
                </div>
                <h2>Edit Centre</h2>
                <p>
                    Update the centre's details below:
                </p>

            </div>

            <div class="center-form">
                <form id="centreForm" class="createForm">

                    <div class="form-row">
                        <label for="centreName">Centre Name</label>
                        <input type="text" id="centreName" required>
                    </div>

                    <div class="form-row">
                        <label for="centreStreet">Centre Street</label>
                        <input type="text" id="centreStreet" required>
                    </div>

                    <div class="form-row">
                        <label for="centreCity">Centre City</label>
                        <input type="text" id="centreCity" required>
                    </div>

                    <div class="form-row">
                        <label for="centreUnitNo">Centre Unit Number</label>
                        <input type="text" id="centreUnitNo" required>
                    </div>

                    <div class="form-row">
                        <label for="centrePostcode">Centre Postcode</label>
                        <input type="text" id="centrePostcode" required>
                    </div>

                    <button type="submit">Update Centre Data</button>
                </form>
            </div>

            <!-- This empty box is filled with success or error messages by JavaScript. -->
            <div id="output" class="message"></div>
            
        </div>

        <script src="../JS/EditJS/editCentreScript.js"></script>
    </body>
</html>
